<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chakradham Ad</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #0f172a; overflow: hidden; font-family: 'Poppins', sans-serif; }
        
        .brand-bg { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1; color: #38bdf8; text-align: center; }
        .brand-bg svg { width: 80px; height: 80px; animation: spin 4s linear infinite; margin-bottom: 10px; opacity: 0.5; }
        .brand-bg h2 { margin: 0; font-size: 2rem; letter-spacing: 2px; opacity: 0.7; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .ad-container { position: relative; z-index: 10; width: 100%; height: 100%; }
        .ad-media { width: 100vw; height: 100vh; object-fit: contain; cursor: pointer; display: none; opacity: 0; transition: opacity 0.5s ease-in-out; }
        .ad-media.active { display: block; opacity: 1; }
        
        #startScreen { position: absolute; inset: 0; background: rgba(0,0,0,0.8); z-index: 200; display: flex; align-items: center; justify-content: center; }
        .start-btn { background: #0ea5e9; color: white; border: none; padding: 15px 40px; font-size: 1.5rem; border-radius: 50px; cursor: pointer; font-family: inherit; font-weight: bold; box-shadow: 0 0 20px rgba(14, 165, 233, 0.5); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        
        .ui-overlay { position: absolute; top: 20px; right: 20px; z-index: 100; display: flex; flex-direction: column; align-items: flex-end; }
        .timer-box { background: rgba(0, 0, 0, 0.7); color: white; padding: 10px 20px; border-radius: 30px; font-size: 1rem; border: 1px solid rgba(255,255,255,0.3); backdrop-filter: blur(5px); }
        .skip-btn { display: none; background: rgba(0, 0, 0, 0.8); color: white; border: 2px solid white; padding: 12px 25px; border-radius: 30px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: background 0.3s; backdrop-filter: blur(5px); }
        .skip-btn:hover { background: rgba(255, 255, 255, 0.2); }
    </style>
</head>
<body>
    <audio id="bgAudio" src="https://raw.githubusercontent.com/nabendudebnathbharatiya-bot/My-app-assets2/main/Nataraj_s_Victory_Dance_part1.mp3" loop></audio>
    
    <div class="brand-bg">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><path d="M12 2a10 10 0 0 1 10 10"></path></svg>
        <h2>CHAKRADHAM ONLINE</h2>
    </div>

    <div id="startScreen">
        <button class="start-btn" onclick="initAdSystem()">Tap to Start</button>
    </div>

    <a id="adLink" href="#" target="_self" class="ad-container">
        <img id="adImg" class="ad-media" src="" alt="Advertisement">
        <video id="adVid" class="ad-media" src="" playsinline muted></video>
    </a>

    <div class="ui-overlay">
        <div class="timer-box" id="timerBox">
            বিজ্ঞাপন স্কিপ করতে <span id="timeCount">8</span> সেকেন্ড...
        </div>
        <button class="skip-btn" id="skipBtn" onclick="skipAd()">Skip Ad ⏭</button>
    </div>

    <script>
        // --- Smart URL Routing Logic ---
        // URL থেকে ?next= এর ভ্যালু নেবে, না পেলে defaultUrl ব্যবহার করবে
        const urlParams = new URLSearchParams(window.location.search);
        const dynamicReturnUrl = urlParams.get('next');
        const finalReturnUrl = dynamicReturnUrl ? decodeURIComponent(dynamicReturnUrl) : 'index.html';

        const ads = [{"type":"image","media":"https://raw.githubusercontent.com/nabendudebnathbharatiya-bot/My-app-assets2/main/background.jpg","link":"https://nabendudebnathbharatiya-bot.github.io/chakradham-cosmic-healing-app-/"},{"type":"image","media":"https://raw.githubusercontent.com/nabendudebnathbharatiya-bot/My-app-assets2/main/Gemini_Generated_Image_2fgfkm2fgfkm2fgf.png","link":"https://nabendudebnathbharatiya-bot.github.io/chakradham-smart-tool/"},{"type":"image","media":"https://raw.githubusercontent.com/nabendudebnathbharatiya-bot/My-app-assets2/main/unnamed%20(1).jpg","link":"https://nabendudebnathbharatiya-bot.github.io/chakradham-cosmic-healing-app-/"},{"type":"image","media":"https://raw.githubusercontent.com/nabendudebnathbharatiya-bot/My-app-assets2/main/unnamed.jpg","link":"https://nabendudebnathbharatiya-bot.github.io/chakradham-cosmic-healing-app-/"}];
        const slideIntervalTime = parseInt('4') * 1000;
        let waitDuration = parseInt('8');
        
        let currentAdIndex = 0;
        let skipTimerInterval;
        let slideTimer;

        const ui = {
            startScreen: document.getElementById('startScreen'),
            link: document.getElementById('adLink'),
            img: document.getElementById('adImg'),
            vid: document.getElementById('adVid'),
            audio: document.getElementById('bgAudio'),
            timerBox: document.getElementById('timerBox'),
            timeCount: document.getElementById('timeCount'),
            skipBtn: document.getElementById('skipBtn')
        };

        function initAdSystem() {
            ui.startScreen.style.display = 'none';
            if(ui.audio) { ui.audio.volume = 0.5; ui.audio.play().catch(e=>{}); }
            startSkipTimer();
            showAd(0);
        }

        function showAd(index) {
            clearTimeout(slideTimer);
            const ad = ads[index];
            
            ui.img.classList.remove('active');
            ui.vid.classList.remove('active');
            ui.vid.pause();

            ui.link.href = ad.link !== '#' ? ad.link : 'javascript:void(0)';

            if (ad.type === 'video') {
                ui.vid.src = ad.media;
                ui.vid.muted = false; 
                if(ui.audio) ui.audio.pause(); 
                
                ui.vid.onloadeddata = () => { ui.vid.classList.add('active'); ui.vid.play(); };
                ui.vid.onended = () => { nextAd(); };
            } else {
                if(ui.audio && ui.audio.paused) ui.audio.play(); 
                ui.img.src = ad.media;
                ui.img.onload = () => { ui.img.classList.add('active'); };
                if(ads.length > 1) { slideTimer = setTimeout(nextAd, slideIntervalTime); }
            }
        }

        function nextAd() {
            if(ads.length > 1) {
                currentAdIndex = (currentAdIndex + 1) % ads.length;
                showAd(currentAdIndex);
            }
        }

        function startSkipTimer() {
            ui.timerBox.style.display = 'block';
            ui.skipBtn.style.display = 'none';
            ui.timeCount.innerText = waitDuration;
            
            skipTimerInterval = setInterval(() => {
                waitDuration--;
                if (waitDuration > 0) {
                    ui.timeCount.innerText = waitDuration;
                } else {
                    clearInterval(skipTimerInterval);
                    ui.timerBox.style.display = 'none';
                    ui.skipBtn.style.display = 'block';
                }
            }, 1000);
        }

        function skipAd() {
            // একই ট্যাবে টার্গেট লিংকে রিডাইরেক্ট করবে
            window.location.href = finalReturnUrl;
        }
    </script>
</body>
</html>
